<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>إدارة الطلاب</title><link rel="stylesheet" href="css/style.css"><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script src="firebase-config.js"></script></head><body><div class="layout"><aside class="sidebar"><div class="side-title"><div class="side-logo">ع</div><div><h2>ثانوية عمورية</h2><small id="userEmail">...</small></div></div><nav class="nav"><a href="dashboard.html">لوحة التحكم</a><a class="active" href="students.html">إدارة الطلاب</a><a href="settings.html">الإعدادات والعمليات</a><button class="logoutBtn">تسجيل الخروج</button></nav></aside><main class="main"><div class="topbar"><div><h1>إدارة الطلاب</h1><p>إضافة الطلاب، البحث، التعديل، الأرشفة، وإصدار الخطابات</p></div><button class="btn" id="addBtn">إضافة طالب جديد</button></div><div class="card"><div class="toolbar"><input class="input" id="searchInput" placeholder="بحث باسم الطالب أو السجل المدني أو المدرسة" style="max-width:360px"><select id="filterStatus" style="max-width:190px"></select><label><input type="checkbox" id="showArchived"> عرض الأرشيف</label><button class="btn secondary" id="exportBtn">تصدير Excel CSV</button></div><div class="table-wrap"><table><thead><tr><th>الطالب</th><th>السجل المدني</th><th>المدرسة</th><th>الصف</th><th>الحالة</th><th>المدخل</th><th>إجراءات</th></tr></thead><tbody id="studentsBody"></tbody></table></div></div></main></div><div class="modal"><div class="modal-card"><div class="modal-head"><h2 id="modalTitle">إضافة طالب</h2><button class="btn secondary" id="closeModal">إغلاق</button></div><form id="studentForm"><input type="hidden" id="studentId"><div class="form-grid"><div class="field"><label>اسم المدرسة</label><input class="input" id="school" required></div><div class="field"><label>اسم الطالب</label><input class="input" id="studentName" required></div><div class="field"><label>السجل المدني</label><input class="input" id="civilId" required></div><div class="field"><label>الجنسية</label><input class="input" id="nationality" required></div><div class="field"><label>الصف</label><select id="grade" required></select></div><div class="field"><label>جوال ولي الأمر</label><input class="input" id="phone"></div><div class="field"><label>الحالة</label><select id="status"></select></div><div class="field full"><label>ملاحظات</label><textarea id="notes"></textarea></div></div><button class="btn">حفظ البيانات</button></form></div></div><script src="js/app.js"></script></body></html>
